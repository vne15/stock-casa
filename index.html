<html lang="es">
<head>

  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      margin: 0;
      padding: 15px;
      line-height: 1.5;
      padding-bottom: 100px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    h1, h2 { color: #90caf9; text-align: center; }
    
    .tabs {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      gap: 10px;
      flex-wrap: wrap;
    }
    .tab {
      padding: 12px 24px;
      background: #1e1e1e;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s;
      font-weight: 500;
    }
    .tab.active {
      background: #1976d2;
      color: white;
      transform: translateY(-2px);
    }

    input, select, button {
      padding: 12px;
      margin: 6px 4px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 1rem;
    }
    input, select { 
      background: #1e1e1e; 
      color: #e0e0e0; 
      width: 100%;
    }
    button {
      background: #1976d2;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      font-weight: 500;
    }
    button:hover { background: #1565c0; }
    button.danger { background: #d32f2f; }
    button.danger:hover { background: #b71c1c; }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .dashboard {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 15px;
      margin-bottom: 20px;
    }
    .metric {
      padding: 20px;
      background: #252525;
      border-radius: 10px;
      text-align: center;
    }
    .metric span { 
      font-size: 2.2rem; 
      font-weight: bold; 
      display: block; 
      color: #90caf9; 
    }

    .producto {
      margin: 10px 0;
      padding: 16px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
      transition: transform 0.2s;
    }
    .producto:hover { transform: translateX(4px); }
    .rojo { background: #b71c1c; }
    .amarillo { background: #f57f17; color: #000; }
    .verde { background: #2e7d32; }

    .producto-info { flex: 1; min-width: 200px; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }

    .hidden { display: none !important; }

    .voice-float {
      position: fixed;
      bottom: 30px;
      right: 30px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .voice-btn-float {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4CAF50, #45a049);
      border: none;
      color: white;
      font-size: 2rem;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(76, 175, 80, 0.4);
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .voice-btn-float:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 30px rgba(76, 175, 80, 0.6);
    }

    .voice-btn-float:active {
      transform: scale(0.95);
    }

    .voice-btn-float.listening {
      background: linear-gradient(135deg, #f44336, #d32f2f);
      animation: pulse-float 1.2s infinite;
      box-shadow: 0 4px 30px rgba(244, 67, 54, 0.6);
    }

    .voice-btn-float.listening:hover {
      box-shadow: 0 6px 40px rgba(244, 67, 54, 0.8);
    }

    .voice-btn-float:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
    }

    @keyframes pulse-float {
      0% { transform: scale(1); box-shadow: 0 4px 30px rgba(244, 67, 54, 0.4); }
      50% { transform: scale(1.08); box-shadow: 0 6px 50px rgba(244, 67, 54, 0.8); }
      100% { transform: scale(1); box-shadow: 0 4px 30px rgba(244, 67, 54, 0.4); }
    }

    .voice-status-float {
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.75rem;
      color: #aaa;
      max-width: 160px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s;
    }

    .voice-status-float.active {
      color: #4CAF50;
      border-color: rgba(76, 175, 80, 0.3);
    }

    .voice-status-float.error {
      color: #f44336;
      border-color: rgba(244, 67, 54, 0.3);
    }

    .voice-status-float.warning {
      color: #ff9800;
      border-color: rgba(255, 152, 0, 0.3);
    }

    .voice-tooltip {
      position: absolute;
      bottom: 80px;
      right: 0;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 0.75rem;
      color: #aaa;
      min-width: 200px;
      border: 1px solid rgba(255,255,255,0.1);
      display: none;
      text-align: left;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    }

    .voice-tooltip.show {
      display: block;
    }

    .voice-tooltip strong {
      color: #90caf9;
      display: block;
      margin-bottom: 4px;
    }

    .voice-tooltip .cmd {
      background: #252525;
      padding: 2px 6px;
      border-radius: 4px;
      color: #4CAF50;
      font-size: 0.7rem;
    }

    @media (max-width: 768px) {
      .voice-btn-float {
        width: 60px;
        height: 60px;
        font-size: 1.6rem;
      }
      .voice-float {
        bottom: 20px;
        right: 20px;
      }
      .voice-status-float {
        font-size: 0.65rem;
        max-width: 120px;
        padding: 4px 10px;
      }
    }

    @media (max-width: 480px) {
      .voice-btn-float {
        width: 55px;
        height: 55px;
        font-size: 1.4rem;
      }
      .voice-float {
        bottom: 15px;
        right: 15px;
      }
      .voice-status-float {
        font-size: 0.6rem;
        max-width: 100px;
        padding: 3px 8px;
      }
    }
  </style>

<script>

async function checkWhatsAppStatus() {

    console.error('Error al verificar estado:', error);
  }
}

    const SUPABASE_URL = 'https://zzpfzqxiyszgkeqxmhrn.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_hr2KcUlqrhaWLIF8OM1-vA_lUJMCWCX';

    const { createClient } = supabase;
    const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let productos = {};
    let gastos = [];
    let totalGasto = 0;
    let editandoNombre = null;
    let recognition = null;
    let isListening = false;
    let timeoutId = null;
    let isProcessing = false;


    function initVoiceRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      
      if (!SpeechRecognition) {
        actualizarEstadoFloat('❌ No soportado', 'error');
        return false;
      }

      if (window.location.protocol !== 'https:' && window.location.hostname !== 'localhost' && window.location.hostname !== '127.0.0.1') {
        actualizarEstadoFloat('⚠️ HTTPS requerido', 'warning');
        return false;
      }

      try {
        recognition = new SpeechRecognition();
        recognition.lang = 'es-ES';
        recognition.continuous = false;
        recognition.interimResults = true; 
        recognition.maxAlternatives = 3;

        recognition.onstart = () => {
          console.log('🟢 Recognition started');
          isListening = true;
          const btn = document.getElementById('voiceBtnFloat');
          btn.classList.add('listening');
          btn.innerHTML = '⏹️';
          actualizarEstadoFloat('🎤 Escuchando...', 'active');
          

          if (timeoutId) clearTimeout(timeoutId);
          timeoutId = setTimeout(() => {
            if (isListening) {
              console.log('⏰ Timeout - reiniciando reconocimiento');
              actualizarEstadoFloat('⏰ Reiniciando...', 'warning');
              reiniciarReconocimiento();
            }
          }, 8000);
        };

        recognition.onerror = (event) => {
          console.error('❌ Recognition error:', event.error);
          
          if (event.error === 'not-allowed') {
            actualizarEstadoFloat('❌ Permiso denegado', 'error');
            stopListening();
          } else if (event.error === 'no-speech') {
            actualizarEstadoFloat('🔇 No se detectó voz', 'warning');

            setTimeout(() => {
              if (isListening) reiniciarReconocimiento();
            }, 1000);
          } else if (event.error === 'audio-capture') {
            actualizarEstadoFloat('❌ Sin micrófono', 'error');
            stopListening();
          } else {
            actualizarEstadoFloat(`❌ ${event.error}`, 'error');
            setTimeout(() => {
              if (isListening) reiniciarReconocimiento();
            }, 2000);
          }
        };

        recognition.onend = () => {
          console.log('🔴 Recognition ended');
          if (timeoutId) {
            clearTimeout(timeoutId);
            timeoutId = null;
          }
          

          if (isListening && !isProcessing) {
            console.log('🔄 Reiniciando reconocimiento (onend)');
            setTimeout(() => {
              if (isListening) reiniciarReconocimiento();
            }, 500);
          } else if (!isListening) {
            stopListening();
          }
        };

        recognition.onresult = (event) => {

          if (event.results[0].isFinal) {
            const transcript = event.results[0][0].transcript.toLowerCase().trim();
            console.log('✅ Texto final:', transcript);
            
            if (transcript && transcript.length > 0) {
              isProcessing = true;
              actualizarEstadoFloat(`📝 "${transcript}"`, 'active');
              procesarComandoVoz(transcript);
              

              setTimeout(() => {
                isProcessing = false;
                if (isListening) stopListening();
              }, 2000);
            }
          } else {

            const transcript = event.results[0][0].transcript.toLowerCase().trim();
            if (transcript) {
              actualizarEstadoFloat(`📝 ${transcript}...`, 'warning');
            }
          }
        };

        actualizarEstadoFloat('✅ Listo', 'active');
        return true;
      } catch (error) {
        console.error('❌ Error init:', error);
        actualizarEstadoFloat('❌ Error init', 'error');
        return false;
      }
    }

    function reiniciarReconocimiento() {
      if (!recognition || !isListening) return;
      
      try {
        recognition.stop();
      } catch (e) {

      }
      
      setTimeout(() => {
        if (isListening) {
          try {
            recognition.start();
          } catch (e) {
            console.error('Error al reiniciar:', e);

            stopListening();
          }
        }
      }, 300);
    }

    function actualizarEstadoFloat(texto, tipo = '') {
      const el = document.getElementById('voiceStatusFloat');
      el.textContent = texto;
      el.className = 'voice-status-float';
      if (tipo) el.classList.add(tipo);
    }

    function toggleVoiceRecognition() {
      if (isProcessing) return;


      if (navigator.permissions) {
        navigator.permissions.query({ name: 'microphone' })
          .then((status) => {
            if (status.state === 'denied') {
              actualizarEstadoFloat('❌ Permiso denegado', 'error');
              return;
            }
            manejarInicioDetencion();
          })
          .catch(() => manejarInicioDetencion());
      } else {
        manejarInicioDetencion();
      }
    }

    function manejarInicioDetencion() {
      if (!recognition) {
        if (!initVoiceRecognition()) return;
      }

      if (isListening) {
        stopListening();
      } else {

        if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
          navigator.mediaDevices.getUserMedia({ audio: true })
            .then((stream) => {

              stream.getTracks().forEach(track => track.stop());
              iniciarReconocimiento();
            })
            .catch((err) => {
              console.error('Error al acceder al micrófono:', err);
              if (err.name === 'NotAllowedError') {
                actualizarEstadoFloat('❌ Permite el micrófono', 'error');
              } else {
                actualizarEstadoFloat('❌ Error micrófono', 'error');
              }
            });
        } else {
          iniciarReconocimiento();
        }
      }
    }

    function iniciarReconocimiento() {
      if (!recognition || isListening) return;
      
      try {
        recognition.start();
        actualizarEstadoFloat('🎤 Iniciando...', 'warning');
      } catch (e) {
        console.error('Error al iniciar:', e);
        if (e.message && e.message.includes('already started')) {
          isListening = true;
          actualizarEstadoFloat('🎤 Escuchando...', 'active');
          document.getElementById('voiceBtnFloat').classList.add('listening');
          document.getElementById('voiceBtnFloat').innerHTML = '⏹️';
        } else {
          actualizarEstadoFloat('❌ Error al iniciar', 'error');
        }
      }
    }

    function stopListening() {
      console.log('⏹️ Stopping listening');
      isListening = false;
      isProcessing = false;
      
      if (timeoutId) {
        clearTimeout(timeoutId);
        timeoutId = null;
      }
      
      const btn = document.getElementById('voiceBtnFloat');
      btn.classList.remove('listening');
      btn.innerHTML = '🎤';
      
      if (recognition) {
        try {
          recognition.stop();
        } catch (e) {

        }
      }
      
      const statusText = document.getElementById('voiceStatusFloat');
      if (!statusText.textContent.includes('✅') && !statusText.textContent.includes('❌')) {
        actualizarEstadoFloat('⏸️ Detenido', '');
      }
    }


    function procesarComandoVoz(texto) {
      const palabrasConsumo = ['gaste', 'gasté', 'consumí', 'usé', 'me comí', 'me tomé', 'me acabé', 'terminé', 'utilicé', 'me bebí'];
      const palabrasCompra = ['compré', 'compre', 'comprar', 'traje', 'añadí', 'agregué', 'nuevo', 'compró'];
      const palabrasFalta = ['falta', 'faltan', 'necesito', 'requiero', 'no hay', 'se acabó', 'terminó', 'acabó'];

      let accion = '';
      let productoEncontrado = '';
      let cantidad = 1;

      const numeros = {
        'un': 1, 'una': 1, 'uno': 1,
        'dos': 2, 'tres': 3, 'cuatro': 4, 'cinco': 5,
        'seis': 6, 'siete': 7, 'ocho': 8, 'nueve': 9, 'diez': 10
      };

      let textoProcesado = texto;

      for (const [palabra, num] of Object.entries(numeros)) {
        if (textoProcesado.includes(palabra)) {
          cantidad = num;
          textoProcesado = textoProcesado.replace(palabra, '').trim();
          break;
        }
      }

      const numeroRegex = /\b(\d+)\b/;
      const match = textoProcesado.match(numeroRegex);
      if (match) {
        cantidad = parseInt(match[1]);
        textoProcesado = textoProcesado.replace(match[1], '').trim();
      }

      let accionEncontrada = false;

      for (const palabra of palabrasFalta) {
        if (textoProcesado.includes(palabra) && !accionEncontrada) {
          accion = 'falta';
          productoEncontrado = extraerProducto(textoProcesado, palabra);
          accionEncontrada = true;
          break;
        }
      }

      if (!accionEncontrada) {
        for (const palabra of palabrasConsumo) {
          if (textoProcesado.includes(palabra) && !accionEncontrada) {
            accion = 'consumo';
            productoEncontrado = extraerProducto(textoProcesado, palabra);
            accionEncontrada = true;
            break;
          }
        }
      }

      if (!accionEncontrada) {
        for (const palabra of palabrasCompra) {
          if (textoProcesado.includes(palabra) && !accionEncontrada) {
            accion = 'compra';
            productoEncontrado = extraerProducto(textoProcesado, palabra);
            accionEncontrada = true;
            break;
          }
        }
      }

      if (!accionEncontrada) {
        accion = 'falta';
        productoEncontrado = limpiarProducto(textoProcesado);
      }

      productoEncontrado = productoEncontrado.trim().toLowerCase();
      
      const articulos = ['el ', 'la ', 'los ', 'las ', 'un ', 'una ', 'unos ', 'unas ', 'de '];
      for (const art of articulos) {
        if (productoEncontrado.startsWith(art)) {
          productoEncontrado = productoEncontrado.substring(art.length);
        }
      }

      const palabrasExtra = ['por', 'para', 'con', 'sin', 'sobre', 'entre'];
      for (const extra of palabrasExtra) {
        productoEncontrado = productoEncontrado.replace(new RegExp(`\\b${extra}\\b`, 'g'), '').trim();
      }

      if (!productoEncontrado || productoEncontrado.length < 2) {
        actualizarEstadoFloat(`❌ No entendí: "${texto}"`, 'error');
        return;
      }

      const productoReal = encontrarProductoSimilar(productoEncontrado);
      
      if (!productoReal) {
        if (accion === 'compra') {
          crearProductoPorVoz(productoEncontrado, cantidad);
          actualizarEstadoFloat(`✅ Creado "${productoEncontrado}"`, 'active');
          return;
        } else {
          crearProductoPorVoz(productoEncontrado, 0);
          actualizarEstadoFloat(`⚠️ Creado "${productoEncontrado}"`, 'warning');
          return;
        }
      }

      ejecutarAccionVoz(productoReal, accion, cantidad);
    }

    function extraerProducto(texto, palabraClave) {
      const index = texto.indexOf(palabraClave);
      let producto = texto.substring(index + palabraClave.length);
      const palabrasExtra = ['de', 'un', 'una', 'el', 'la', 'los', 'las', 'para', 'por', 'con', 'sin'];
      producto = producto.split(' ').filter(p => !palabrasExtra.includes(p) && p.length > 1).join(' ');
      return producto.trim();
    }

    function limpiarProducto(texto) {
      const palabrasAQuitar = [
        'gaste', 'gasté', 'consumí', 'usé', 'me comí', 'me tomé', 'me acabé', 'terminé', 'utilicé', 'me bebí',
        'compré', 'compre', 'comprar', 'traje', 'añadí', 'agregué', 'nuevo', 'compró',
        'falta', 'faltan', 'necesito', 'requiero', 'no hay', 'se acabó', 'terminó', 'acabó',
        'un', 'una', 'el', 'la', 'los', 'las', 'de', 'para', 'por', 'con', 'sin', 'sobre', 'entre'
      ];
      
      let limpio = texto;
      for (const palabra of palabrasAQuitar) {
        limpio = limpio.replace(new RegExp(`\\b${palabra}\\b`, 'g'), '');
      }
      limpio = limpio.replace(/\s+/g, ' ').trim();
      return limpio;
    }

    function encontrarProductoSimilar(busqueda) {
      const nombres = Object.keys(productos);
      if (!nombres.length) return null;

      if (nombres.includes(busqueda)) return busqueda;

      for (const nombre of nombres) {
        if (nombre.toLowerCase().includes(busqueda) || busqueda.includes(nombre.toLowerCase())) {
          return nombre;
        }
      }

      let mejorCoincidencia = null;
      let mejorPuntaje = 0;
      
      for (const nombre of nombres) {
        const puntaje = calcularSimilitud(nombre.toLowerCase(), busqueda);
        if (puntaje > mejorPuntaje && puntaje > 0.5) {
          mejorPuntaje = puntaje;
          mejorCoincidencia = nombre;
        }
      }

      return mejorCoincidencia;
    }

    function calcularSimilitud(str1, str2) {
      const set1 = new Set(str1.split(''));
      const set2 = new Set(str2.split(''));
      const intersection = new Set([...set1].filter(x => set2.has(x)));
      const union = new Set([...set1, ...set2]);
      return intersection.size / union.size;
    }

    async function crearProductoPorVoz(nombre, cantidad) {
      try {
        await supabaseClient
          .from('productos')
          .upsert({
            nombre: nombre,
            cantidad: cantidad,
            categoria: 'comida',
            updated_at: new Date().toISOString()
          }, { onConflict: 'nombre' });
        await cargarDatos();
      } catch (err) {
        console.error('Error:', err);
      }
    }

    async function ejecutarAccionVoz(nombre, accion, cantidad) {
      const producto = productos[nombre];
      if (!producto) {
        actualizarEstadoFloat(`❌ "${nombre}" no encontrado`, 'error');
        return;
      }

      let nuevaCantidad = producto.cantidad;
      let mensaje = '';

      if (accion === 'consumo') {
        nuevaCantidad = Math.max(0, producto.cantidad - cantidad);
        mensaje = `✅ -${cantidad} "${nombre}"`;
      } else if (accion === 'compra') {
        nuevaCantidad = producto.cantidad + cantidad;
        mensaje = `✅ +${cantidad} "${nombre}"`;
      } else if (accion === 'falta') {
        nuevaCantidad = 0;
        mensaje = `⚠️ "${nombre}" faltante`;
      }

      try {
        await supabaseClient
          .from('productos')
          .update({
            cantidad: nuevaCantidad,
            updated_at: new Date().toISOString()
          })
          .eq('nombre', nombre);
        
        await cargarDatos();
        actualizarEstadoFloat(mensaje, 'active');
      } catch (err) {
        actualizarEstadoFloat(`❌ Error "${nombre}"`, 'error');
        console.error(err);
      }
    }

    async function cargarDatos() {
      try {
        const { data: prodData, error: prodError } = await supabaseClient
          .from('productos')
          .select('*')
          .order('nombre');

        if (prodError) throw prodError;

        productos = {};
        prodData.forEach(p => {
          productos[p.nombre] = { 
            cantidad: p.cantidad, 
            categoria: p.categoria 
          };
        });

        const { data: gastoData, error: gastoError } = await supabaseClient
          .from('gastos')
          .select('*')
          .order('fecha', { ascending: false });

        if (gastoError) throw gastoError;

        gastos = gastoData || [];
        totalGasto = gastos.reduce((sum, g) => sum + parseFloat(g.monto || 0), 0);

        renderDashboard();
        if (!document.getElementById('tab1').classList.contains('hidden')) renderInventario();
        if (!document.getElementById('tab3').classList.contains('hidden')) renderHistorialGastos();
      } catch (err) {
        console.error(err);
        alert("Error al cargar datos: " + err.message);
      }
    }

    async function guardarProducto() {
      const nombre = document.getElementById("nombre").value.trim();
      const cantidad = parseInt(document.getElementById("cantidad").value) || 0;
      const categoria = document.getElementById("categoria").value;

      if (!nombre) return alert("El nombre es obligatorio");

      const payload = { 
        nombre, 
        cantidad, 
        categoria,
        updated_at: new Date().toISOString()
      };

      try {
        const { error } = await supabaseClient
          .from('productos')
          .upsert(payload, { onConflict: 'nombre' });

        if (error) throw error;

        alert(editandoNombre ? "✅ Producto actualizado" : "✅ Producto guardado");
        cancelarEdicion();
        await cargarDatos();
      } catch (err) {
        alert("Error: " + err.message);
      }
    }

    function cancelarEdicion() {
      editandoNombre = null;
      document.getElementById("nombre").value = "";
      document.getElementById("cantidad").value = "";
      showTab(2);
    }

    async function cambiarCantidad(nombre, delta) {
      const actual = productos[nombre]?.cantidad ?? 0;
      const nueva = Math.max(0, actual + delta);

      try {
        await supabaseClient
          .from('productos')
          .update({ 
            cantidad: nueva, 
            updated_at: new Date().toISOString() 
          })
          .eq('nombre', nombre);
        
        await cargarDatos();
      } catch (err) {
        alert("Error al actualizar cantidad");
      }
    }

    async function eliminarProducto(nombre) {
      if (!confirm(`¿Eliminar ${nombre}?`)) return;
      
      try {
        await supabaseClient.from('productos').delete().eq('nombre', nombre);
        await cargarDatos();
      } catch (err) {
        alert("Error al eliminar");
      }
    }

    function editarProducto(nombre) {
      const p = productos[nombre];
      if (!p) return;
      
      editandoNombre = nombre;
      document.getElementById("nombre").value = nombre;
      document.getElementById("cantidad").value = p.cantidad;
      document.getElementById("categoria").value = p.categoria;
      showTab(2);
    }

    async function registrarGasto() {
      const montoInput = document.getElementById("gasto");
      const monto = parseFloat(montoInput.value);
      
      if (!monto || monto <= 0) return alert("Ingresa un monto válido");

      try {
        const { error } = await supabaseClient.from('gastos').insert({
          monto,
          fecha: new Date().toLocaleDateString('es-ES')
        });

        if (error) throw error;

        montoInput.value = "";
        await cargarDatos();
      } catch (err) {
        alert("Error al registrar gasto");
      }
    }

    function renderDashboard() {
      let total = 0, criticos = 0, reponer = 0;
      const urgentesContainer = document.getElementById("urgentes");
      urgentesContainer.innerHTML = "";

      Object.entries(productos).forEach(([nombre, data]) => {
        total++;
        const cantidad = data.cantidad;

        if (cantidad <= 1) criticos++;
        else if (cantidad <= 3) reponer++;

        if (cantidad <= 1) {
          const div = document.createElement("div");
          div.className = `producto rojo`;
          div.innerHTML = `
            <div class="producto-info">
              <strong>${escapeHtml(nombre)}</strong><br>
              ${cantidad} unidades • ${data.categoria}
            </div>
            <div class="actions">
              <button onclick="cambiarCantidad('${escapeHtml(nombre)}', 1)">+</button>
              <button onclick="cambiarCantidad('${escapeHtml(nombre)}', -1)">-</button>
              <button onclick="editarProducto('${escapeHtml(nombre)}')">✏️</button>
              <button class="danger" onclick="eliminarProducto('${escapeHtml(nombre)}')">🗑️</button>
            </div>
          `;
          urgentesContainer.appendChild(div);
        }
      });

      document.getElementById("totalProductos").innerText = total;
      document.getElementById("criticos").innerText = criticos;
      document.getElementById("reponer").innerText = reponer;
      document.getElementById("totalGasto").innerText = totalGasto.toFixed(2);
    }

    function renderInventario() {
      const container = document.getElementById("inventario");
      container.innerHTML = "";

      Object.entries(productos).forEach(([nombre, data]) => {
        const cantidad = data.cantidad;
        const div = document.createElement("div");
        div.className = `producto ${cantidad <= 1 ? 'rojo' : cantidad <= 3 ? 'amarillo' : 'verde'}`;
        div.dataset.categoria = data.categoria;
        div.dataset.estado = cantidad <= 1 ? 'critico' : cantidad <= 3 ? 'reponer' : 'ok';

        div.innerHTML = `
          <div class="producto-info">
            <strong>${escapeHtml(nombre)}</strong><br>
            ${cantidad} unidades • ${data.categoria}
          </div>
          <div class="actions">
            <button onclick="cambiarCantidad('${escapeHtml(nombre)}', 1)">+</button>
            <button onclick="cambiarCantidad('${escapeHtml(nombre)}', -1)">-</button>
            <button onclick="editarProducto('${escapeHtml(nombre)}')">✏️</button>
            <button class="danger" onclick="eliminarProducto('${escapeHtml(nombre)}')">🗑️</button>
          </div>
        `;
        container.appendChild(div);
      });
    }

    function aplicarFiltros() {
      const query = document.getElementById("buscador").value.toLowerCase().trim();
      const estado = document.getElementById("filtroEstado").value;
      const cat = document.getElementById("filtroCategoria").value;

      document.querySelectorAll("#inventario .producto").forEach(p => {
        const texto = p.innerText.toLowerCase();
        const coincideBusqueda = !query || texto.includes(query);
        const coincideEstado = !estado || p.dataset.estado === estado;
        const coincideCat = !cat || p.dataset.categoria === cat;

        p.style.display = (coincideBusqueda && coincideEstado && coincideCat) ? "flex" : "none";
      });
    }

    function renderHistorialGastos() {
      const cont = document.getElementById("historialGastos");
      cont.innerHTML = gastos.map(g => `
        <p>${g.fecha} → <strong>$${parseFloat(g.monto).toFixed(2)}</strong></p>
      `).join('');
    }

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.add('hidden'));
      document.getElementById(`tab${n}`).classList.remove('hidden');
      
      document.querySelectorAll('.tab').forEach((tab, i) => {
        tab.classList.toggle('active', i === n);
      });

      if (n === 1) renderInventario();
      if (n === 3) renderHistorialGastos();
    }

    function escapeHtml(unsafe) {
      return unsafe.replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function exportarDatos() {
      const data = { productos, gastos, totalGasto, exportDate: new Date().toISOString() };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `stock-casa-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function importarDatos() {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = ".json";
      input.onchange = async e => {
        const file = e.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = async (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (data.productos) {
              for (const [nombre, info] of Object.entries(data.productos)) {
                await supabaseClient.from('productos').upsert({
                  nombre,
                  cantidad: info.cantidad,
                  categoria: info.categoria
                });
              }
            }
            await cargarDatos();
            alert("✅ Datos importados correctamente");
          } catch (err) {
            alert("Error al importar: " + err.message);
          }
        };
        reader.readAsText(file);
      };
      input.click();
    }

    async function limpiarTodo() {
      if (!confirm("⚠️ ¿Estás seguro de borrar TODOS los datos? Esta acción es irreversible.")) return;
      
      try {
        await supabaseClient.from('productos').delete().neq('nombre', '');
        await supabaseClient.from('gastos').delete().neq('id', 0);
        location.reload();
      } catch (err) {
        alert("Error al borrar datos");
      }
    }


    document.getElementById('voiceBtnFloat').addEventListener('mouseenter', () => {
      document.getElementById('voiceTooltip').classList.add('show');
    });
    document.getElementById('voiceBtnFloat').addEventListener('mouseleave', () => {
      document.getElementById('voiceTooltip').classList.remove('show');
    });


    window.onload = () => {
      cargarDatos();
      
      setTimeout(() => {
        initVoiceRecognition();
      }, 500);
      
      supabaseClient
        .channel('productos')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'productos' }, cargarDatos)
        .subscribe();
    };

// Función mejorada para verificar estado
async function checkWhatsAppStatus() {
    try {
        const response = await fetch('/api/whatsapp');
        const data = await response.json();
        
        const statusDiv = document.getElementById('whatsappStatus');
        const statusMsg = document.getElementById('statusMessage');
        const qrContainer = document.getElementById('qrContainer');
        const qrImage = document.getElementById('qrImage');
        
        // Mostrar el panel
        statusDiv.style.display = 'block';
        
        if (data.status === 'connected') {
            statusMsg.innerHTML = '✅ Conectado a WhatsApp<br><small style="color:#4CAF50;">Bot activo</small>';
            qrContainer.style.display = 'none';
            statusDiv.style.borderColor = '#4CAF50';
        } else if (data.status === 'waiting_qr' || data.qr) {
            statusMsg.innerHTML = '📱 Escanea el QR con WhatsApp';
            qrContainer.style.display = 'block';
            const qrData = data.qr || data.qrCode;
            if (qrData) {
                qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrData)}`;
            }
            statusDiv.style.borderColor = '#FF9800';
        } else {
            statusMsg.innerHTML = '🔄 Conectando a WhatsApp...<br><small>Espera unos segundos</small>';
            qrContainer.style.display = 'none';
            statusDiv.style.borderColor = '#FF9800';
        }
    } catch (error) {
        console.error('Error al verificar estado:', error);
        const statusMsg = document.getElementById('statusMessage');
        statusMsg.innerHTML = '⚠️ Bot no disponible<br><small>¿Está desplegado en Vercel?</small>';
    }
}
